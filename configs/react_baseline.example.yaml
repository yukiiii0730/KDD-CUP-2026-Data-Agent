dataset:
  root_path: data/public/input

agent:
  model: qwen3-plus
  api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key: ${DASHSCOPE_API_KEY}
  max_steps: 16
  max_retries_per_step: 1
  temperature: 0.0

run:
  output_dir: artifacts/runs
  run_id:
  max_workers: 8
  task_timeout_seconds: 600
